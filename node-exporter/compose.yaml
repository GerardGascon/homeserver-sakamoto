services:
  node-exporter:
    container_name: node-exporter
    image: quay.io/prometheus/node-exporter:latest
    command:
      - '--path.rootfs=/host'
    ports:
      - "9100:9100"
    volumes:
      - '/:/host:ro,rslave'
    restart: unless-stopped
    labels:
      glance.name: Node exporter
      glance.category: services
      glance.icon: si:prometheus
      glance.hide: false
